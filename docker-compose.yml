services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: raccbuddy
      POSTGRES_PASSWORD: raccbuddy
      POSTGRES_DB: raccbuddy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    # Healthcheck ensures the app never starts before Postgres is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raccbuddy -d raccbuddy"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    # Expose the REST API port for external tooling / debugging.
    # The WhatsApp bridge reaches it via internal Docker network (no public exposure needed).
    # Uncomment the line below to expose on the host machine:
    # ports:
    #   - "8000:8000"
    environment:
      # Required: Set your Telegram bot token
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OWNER_TELEGRAM_ID=${OWNER_TELEGRAM_ID:-0}

      # WhatsApp
      - OWNER_WHATSAPP_NUMBER=${OWNER_WHATSAPP_NUMBER:-}

      # Database
      - DATABASE_URL=postgresql+asyncpg://raccbuddy:raccbuddy@db:5432/raccbuddy

      # LLM Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-ollama}

      # Ollama (use host.docker.internal to reach host machine's Ollama)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}

      # xAI (optional)
      - XAI_API_KEY=${XAI_API_KEY:-}
      - XAI_MODEL=${XAI_MODEL:-grok-3-mini}

      # Context window — sent as num_ctx to Ollama (MUST match Ollama's loaded model capacity)
      - MAX_CONTEXT_TOKENS=${MAX_CONTEXT_TOKENS:-30000}

      # Optional settings
      - NUDGE_CHECK_INTERVAL_MINUTES=${NUDGE_CHECK_INTERVAL_MINUTES:-60}
      - OWNER_MEMORY_RETENTION_DAYS=${OWNER_MEMORY_RETENTION_DAYS:-90}

      # API security — generate with: python -c "import secrets; print(secrets.token_hex(32))"
      - API_SECRET_KEY=${API_SECRET_KEY:-}

    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  whatsapp:
    build: ./whatsapp-service
    environment:
      - PORT=3001
      - PYTHON_CORE_URL=http://app:8000
      # Must match API_SECRET_KEY set on the app service
      - API_SECRET_KEY=${API_SECRET_KEY:-}
    volumes:
      - wa-session:/app/.wwebjs_auth
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  wa-session:
